{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title|default:"ReDoc" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="redoc-container"></div>
  {% if redoc_cdn %}
    <script src="{{ redoc_cdn }}"></script>
  {% else %}
    <script src="{% static 'dmr/redoc/2.5.2/redoc.standalone.js' %}"></script>
  {% endif %}
  <script>
    Redoc.init({{ schema | safe }}, {}, document.getElementById('redoc-container'));
  </script>
</body>
</html>
