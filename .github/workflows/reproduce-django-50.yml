name: reproduce-django-50

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  controller-import:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

    - name: Reproduce Django 5.0 MediaType import failure
      run: |
        uv run --with 'Django==5.0.14' --with 'msgspec>=0.21.1' python - <<'PY'
        from django.conf import settings
        from django.http.request import MediaType

        settings.configure(
            SECRET_KEY='dev',
            DEFAULT_CHARSET='utf-8',
            USE_I18N=False,
            INSTALLED_APPS=[],
        )

        media_type = MediaType('application/json')
        print('has MediaType.quality:', hasattr(media_type, 'quality'))
        print('has MediaType.specificity:', hasattr(media_type, 'specificity'))

        import msgspec

        from dmr import Controller
        from dmr.plugins.msgspec import MsgspecSerializer

        class HealthResponse(msgspec.Struct, frozen=True):
            ok: bool

        class HealthController(Controller[MsgspecSerializer]):
            def get(self) -> HealthResponse:
                return HealthResponse(ok=True)

        print(HealthController)
        PY
