name: test-extras

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - "dmr/**"
      - "tests/**"
      - "django_test_app/**"
      - ".github/workflows/test-extras.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "justfile"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pypy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['pypy3.11']

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

    - name: Install dependencies
      run: |
        uv sync --group unit-test --no-group dev \
          --no-extra msgspec --no-extra attrs --all-extras

    - name: Run checks
      run: uv run --no-sync pytest tests/test_unit -o addopts=""


  test-django-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        django-version:
          - 'Django~=5.0.0'
          - 'Django~=5.1.0'
          - 'Django~=6.0.0'

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

    - name: Install just
      run: uv tool install rust-just

    - name: Install dependencies
      run: |
        uv sync --all-extras --group integration
        uv pip install "${{ matrix.django-version }}"

    - name: Run checks
      run: just smoke unit --cov-fail-under=98


  build-no-msgspec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

    - name: Install just
      run: uv tool install rust-just

    - name: Install dependencies
      run: uv sync --no-extra msgspec --no-extra attrs --all-extras --group integration

    - name: Run checks
      run: |
        just smoke example
        uv run pytest --cov-fail-under=90


  build-no-pydantic:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

    - name: Install just
      run: uv tool install rust-just

    - name: Install dependencies
      run: uv sync --no-extra pydantic --all-extras --group integration

    - name: Run checks
      run: |
        just smoke
        uv run pytest tests/test_unit/test_plugins/test_msgspec --cov-fail-under=50


  build-no-serializers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

    - name: Install just
      run: uv tool install rust-just

    - name: Install dependencies
      run: uv sync --extra jwt

    - name: Run checks
      run: just smoke
