name: Test compiled with mypyc

# Runs on every push to master and on all pull requests.
# Can also be triggered manually from the GitHub UI.
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Also build the pure-Python wheel and the source distribution so that
  # unsupported platforms automatically fall back to the pure-Python
  # implementation when pip installs from PyPI.
  build_pure:
    name: Pure-Python wheel + sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build
        run: pip install build

      - name: Build sdist and pure-Python wheel
        run: python -m build --sdist --wheel
