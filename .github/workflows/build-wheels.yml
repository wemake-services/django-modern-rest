name: Test compiled with mypyc

# Runs on every push to master and on all pull requests.
# Can also be triggered manually from the GitHub UI.
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # Always run with mypyc compilation:
      HATCH_BUILD_HOOKS_ENABLE: 1

    strategy:
      fail-fast: false
      matrix:
        os:
          # TODO: add ubuntu-24.04-arm and musl?
          - ubuntu-latest        # Linux x86_64
          - macos-latest         # macOS x86_64 + arm64 (universal2)

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          config-file: pyproject.toml

  # Also build the pure-Python wheel and the source distribution so that
  # unsupported platforms automatically fall back to the pure-Python
  # implementation when pip installs from PyPI.
  build_pure:
    name: Pure-Python wheel + sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build
        run: pip install build

      - name: Build sdist and pure-Python wheel
        run: python -m build --sdist --wheel
