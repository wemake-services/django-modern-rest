repos:
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 1a4bb160cab6417b3045e1b37b6b72449243e658  # frozen: 0.37.4
    hooks:
      - id: check-dependabot
      - id: check-github-workflows
      - id: check-github-actions
      - id: check-github-issue-config
      - id: check-github-issue-forms
      - id: check-readthedocs
      - id: check-compose-spec

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
        additional_dependencies:
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@latest"

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
    hooks:
      - id: zizmor
        args: ["--no-progress", "--fix"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=style"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 01a675ea018f2fb714478a5ffb83fcea8374bb06  # frozen: v0.15.21
    hooks:
      - id: ruff-check
        args: ["--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/sphinx-contrib/sphinx-lint
    rev: c883505f64b59c3c5c9375191e4ad9f98e727ccd  # frozen: v1.0.2
    hooks:
      - id: sphinx-lint
        args: ["--enable=all", "--disable=line-too-long"]
        files: ^docs/

  - repo: https://github.com/crate-ci/typos
    rev: 96d9af6217dc2855210655af7e1ff19d23d4e593  # frozen: v1
    hooks:
      - id: typos

  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
    hooks:
    - id: codespell
      additional_dependencies:
        - tomli

  - repo: https://github.com/lycheeverse/lychee
    rev: "2bba271688c1abb1503097a064e6c3bc1d1b6a9b"  # frozen: v0.24.2
    hooks:
      - id: lychee
        args: ["--config", ".github/lychee.toml"]

  - repo: https://github.com/instrumentl/pre-commit-just
    rev: 0340ee8d7f8341d6b9b03e086ab937f7fa38134c  # frozen: v0.2
    hooks:
      - id: format-justfile

  # Should be applied after all autofixes:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: \.msgpack$
      - id: check-yaml
      - id: check-toml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-illegal-windows-names
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-case-conflict

  # Should be the last:
  - repo: meta
    hooks:
      - id: check-useless-excludes

ci:
  autofix_prs: true
  autoupdate_schedule: weekly
  submodules: false
